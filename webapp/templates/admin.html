<!DOCTYPE html>
<html lang="ru">
<head>

</head>
<body>
<div id="admin-app">
    <aside class="sidebar" id="sidebar">

        <nav class="sidebar-nav">
            <div class="nav-group">Обзор</div>

            <button class="nav-item" data-section="generations"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>Генерации</button>
            <div class="nav-group" data-role="owner">Финансы</div>
            <button class="nav-item" data-section="payments" data-role="owner"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>Платежи</button>
            <button class="nav-item" data-section="withdrawals" data-role="owner"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>Выводы</button>
            <div class="nav-group" data-role="owner">Контент</div>
            <button class="nav-item" data-section="templates" data-role="owner"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg>Шаблоны</button>
            <button class="nav-item" data-section="promos" data-role="owner"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M16 8 8 16M9.5 9h.01M14.5 15h.01"/></svg>Промокоды</button>

            <button class="nav-item" data-section="referrals" data-role="owner"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5 8.6 10.5"/></svg>Рефералы</button>
            <button class="nav-item" data-section="support"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Поддержка</button>
            <div class="nav-group" data-role="owner">Система</div>
            <button class="nav-item" data-section="face" data-role="owner"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M9 10h.01M15 10h.01M9.5 15a3.5 3.5 0 0 0 5 0"/></svg>Сходство лиц</button>

    <main class="main">
        <header class="topbar">
            <button class="menu-toggle" id="menu-toggle">&#9776;</button>
            <span class="topbar-title" id="topbar-title">Dashboard</span>
            <button class="btn btn-outline btn-sm" style="margin-left:auto" onclick="logout()">Выход</button>
        </header>
        <div class="main-content" id="main-content"></div>
    </main>
</div>
<!-- User detail modal -->
<div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
</div>
<script src="/static/js/admin-kit.js?v=1"></script>
<script src="/static/js/admin-table.js?v=2"></script>

</html>
