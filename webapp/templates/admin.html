<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptW Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin.css?v=12">
</head>
<body>
<div id="admin-app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">Prompt<span class="brand-accent">W</span> <span class="brand-tag">admin</span></div>
        <nav class="sidebar-nav">
            <button class="nav-item active" data-section="dashboard">Dashboard</button>
            <button class="nav-item" data-section="users">Пользователи</button>
            <button class="nav-item" data-section="generations">Генерации</button>
            <button class="nav-item" data-section="payments" data-role="owner">Платежи</button>
            <button class="nav-item" data-section="withdrawals" data-role="owner">Выводы</button>
            <button class="nav-item" data-section="templates" data-role="owner">Шаблоны</button>
            <button class="nav-item" data-section="promos" data-role="owner">Промокоды</button>
            <button class="nav-item" data-section="referrals" data-role="owner">Рефералы</button>
            <button class="nav-item" data-section="support">Поддержка</button>
            <button class="nav-item" data-section="face" data-role="owner">Сходство лиц</button>
            <button class="nav-item" data-section="notif" data-role="owner">Уведомления</button>
            <button class="nav-item" data-section="audit" data-role="owner">Аудит-лог</button>
            <button class="nav-item" data-section="accounts" data-role="owner">Доступ</button>
        </nav>
    </aside>
    <main class="main">
        <header class="topbar">
            <button class="menu-toggle" id="menu-toggle">&#9776;</button>
            <span class="topbar-title" id="topbar-title">Dashboard</span>
            <button class="btn btn-outline btn-sm" style="margin-left:auto" onclick="logout()">Выход</button>
        </header>
        <div class="main-content" id="main-content"></div>
    </main>
</div>
<!-- User detail modal -->
<div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
</div>
<script src="/static/js/admin-kit.js?v=1"></script>
<script src="/static/js/admin-table.js?v=1"></script>
<script src="/static/js/admin.js?v=22"></script>
</body>
</html>
